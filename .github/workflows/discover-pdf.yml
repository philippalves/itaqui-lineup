name: Discover Itaqui PDF

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run PDF discovery
        run: npm run discover

      - name: Run PDF download
        run: npm run download

      - name: Run JSON build
        run: npm run build-json

      - name: Show discovered file
        if: always()
        run: |
          echo "=== discovered-pdf.json ==="
          if [ -f data/discovered-pdf.json ]; then
            cat data/discovered-pdf.json
          else
            echo "data/discovered-pdf.json not found"
          fi

      - name: Show downloaded file metadata
        if: always()
        run: |
          echo "=== downloaded-pdf.json ==="
          if [ -f data/downloaded-pdf.json ]; then
            cat data/downloaded-pdf.json
          else
            echo "data/downloaded-pdf.json not found"
          fi

      - name: Show latest json
        if: always()
        run: |
          echo "=== latest.json ==="
          if [ -f data/latest.json ]; then
            cat data/latest.json
          else
            echo "data/latest.json not found"
          fi

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/discovered-pdf.json
          git add data/downloaded-pdf.json
          git add data/latest.json
          git add downloads/latest.pdf
          git add downloads/latest.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Itaqui PDF, text and JSON"
            git push
          fi
