name: Discover Itaqui PDF

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run PDF discovery
        run: npm run discover

      - name: Show discovered file
        if: always()
        run: |
          echo "=== discovered-pdf.json ==="
          if [ -f data/discovered-pdf.json ]; then
            cat data/discovered-pdf.json
          else
            echo "data/discovered-pdf.json not found"
          fi

      - name: Commit discovered PDF file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/discovered-pdf.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update discovered Itaqui PDF"
            git push
          fi
