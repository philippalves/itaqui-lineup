name: Discover Itaqui PDF

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run PDF discovery
        run: npm run discover

      - name: Run PDF download
        run: npm run download

      - name: Run JSON build
        run: npm run build-json

      - name: Show discovered file
        if: always()
        run: |
          echo "=== discovered-pdf.json ==="
          if [ -f data/discovered-pdf.json ]; then
            cat data/discovered-pdf.json
          else
            echo "data/discovered-pdf.json not found"
          fi

      - name: Show downloaded file metadata
        if: always()
        run: |
          echo "=== downloaded-pdf.json ==="
          if [ -f data/downloaded-pdf.json ]; then
            cat data/downloaded-pdf.json
          else
            echo "data/downloaded-pdf.json not found"
          fi

      - name: Show parser outputs
        if: always()
        run: |
          echo "=== latest-debug.json ==="
          if [ -f data/latest-debug.json ]; then
            cat data/latest-debug.json
          else
            echo "data/latest-debug.json not found"
          fi

          echo ""
          echo "=== latest.json ==="
          if [ -f data/latest.json ]; then
            cat data/latest.json
          else
            echo "data/latest.json not found"
          fi

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/discovered-pdf.json
          git add data/downloaded-pdf.json
          git add data/latest-debug.json
          git add data/latest.json
          git add downloads/latest.pdf

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Itaqui lineup data"
            git push
          fi
